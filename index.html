<!DOCTYPE html>
<html>
<head>
  <title>My AI Chat</title>
</head>
<body>

<h2>My AI 🤖</h2>

<div id="chat"></div>

<input id="msg" placeholder="Type message..." />
<button onclick="send()">Send</button>

<script>
async function send() {
  let input = document.getElementById("msg").value;

  document.getElementById("chat").innerHTML += "<p>You: " + input + "</p>";

  let res = await fetch("https://YOUR-RAILWAY-URL/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message: input })
  });

  let data = await res.json();

  document.getElementById("chat").innerHTML += "<p>AI: " + data.reply + "</p>";
}
</script>

</body>
</html>
